name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.actor }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: shellcheck ./tools/zig.sh
      - run: shellcheck ./tools/download_zig.sh
      - run: shellcheck ./tools/minisign.sh
      - run: shellcheck ./tools/download_minisign.sh
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/zig.ps1 -Severity Error,Warning,Information -EnableExit
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/download_zig.ps1 -Severity Error,Warning,Information -EnableExit
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/minisign.win.ps1 -Severity Error,Warning,Information -EnableExit
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/download_minisign.ps1 -Severity Error,Warning,Information -EnableExit

  test:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { os: "freebsd", arch: "x86-64", version: "15.0", runner: "ubuntu-latest" }
          - { os: "linux", arch: "x86_64", runner: "ubuntu-24.04" }
          - { os: "linux", arch: "x86_64", runner: "ubuntu-22.04" }
          - { os: "linux", arch: "aarch64", runner: "ubuntu-24.04-arm" }
          - { os: "linux", arch: "aarch64", runner: "ubuntu-22.04-arm" }
          - { os: "macos", arch: "x86_64", runner: "macos-15-intel" }
          - { os: "macos", arch: "aarch64", runner: "macos-14" }
          - { os: "macos", arch: "aarch64", runner: "macos-15" }
          - { os: "windows", arch: "x86_64", runner: "windows-2025" }
          - { os: "windows", arch: "x86_64", runner: "windows-2022" }
          - { os: "windows", arch: "aarch64", runner: "windows-11-arm" }
      fail-fast: false

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Cache Go
        uses: actions/cache@v5.0.3
        if: ${{ matrix.os != 'freebsd' }}
        with:
          path: |
            tools/.go
          key: go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig', 'tools/file.zig', 'tools/go.zig', 'tools/output.zig') }}
      - name: Cache Minisign
        uses: actions/cache@v5.0.3
        if: ${{ matrix.os != 'freebsd' }}
        with:
          path: |
            tools/.minisign
          key: minisign-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tools/download_minisign.*', 'tools/minisign.*') }}
      - name: Cache Zig
        uses: actions/cache@v5.0.3
        if: ${{ matrix.os != 'freebsd' }}
        with:
          path: |
            tools/.zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tools/download_zig.*', 'tools/zig.*') }}
      - name: Cache toml-test
        uses: actions/cache@v5.0.3
        if: ${{ matrix.os != 'freebsd' }}
        with:
          path: |
            vendor/toml-test
          key: toml-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig', 'tools/fetch_toml_test.zig', 'tools/file.zig', 'tools/go.zig', 'tools/output.zig') }}
      - name: Resolve Homebrew paths
        id: brew-paths
        if: ${{ matrix.os == 'macos' }}
        run: |
          echo "cache=$(brew --cache)" >> "${GITHUB_OUTPUT}"
          echo "cellar=$(brew --cellar)" >> "${GITHUB_OUTPUT}"
      - name: Cache Homebrew
        id: brew-cache
        uses: actions/cache@v5.0.3
        if: ${{ matrix.os == 'macos' && matrix.arch == 'x86_64' }}
        with:
          path: |
            ${{ steps.brew-paths.outputs.cache }}
            ${{ steps.brew-paths.outputs.cellar }}
          key: brew-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/ci.yml') }}
      - run: brew install minisign@0.12
        if: ${{ steps.brew-cache.outputs.cache-hit != 'true' && matrix.os == 'macos' && matrix.arch == 'x86_64' }}
      - run: brew link minisign@0.12
        if: ${{ steps.brew-cache.outputs.cache-hit == 'true' && matrix.os == 'macos' && matrix.arch == 'x86_64' }}
      - run: ./zig.ps1 build fetch-toml-test
        if: ${{ matrix.os != 'freebsd' }}
      - run: ./zig.ps1 build test --summary all
        if: ${{ matrix.os != 'freebsd' }}
      - uses: cross-platform-actions/action@v0.32.0
        if: ${{ matrix.os == 'freebsd' }}
        with:
          operating_system: ${{ matrix.os }}
          architecture: ${{ matrix.arch }}
          version: ${{ matrix.version }}
          run: |
            sudo -n pkg install -y minisign
            ./zig build fetch-toml-test
            ./zig build test --summary all
