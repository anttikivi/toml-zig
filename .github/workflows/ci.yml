name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  BENCHMARKS: tiny,small,medium
  COMPARE_REFS: v0.1.0

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: shellcheck ./tools/zig.sh
      - run: shellcheck ./tools/download_zig.sh
      - run: shellcheck ./tools/minisign.sh
      - run: shellcheck ./tools/download_minisign.sh
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/zig.ps1 -Severity Error,Warning,Information -EnableExit -ExcludeRule PSUseBOMForUnicodeEncodedFile
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/download_zig.ps1 -Severity Error,Warning,Information -EnableExit -ExcludeRule PSUseBOMForUnicodeEncodedFile
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/minisign.win.ps1 -Severity Error,Warning,Information -EnableExit -ExcludeRule PSUseBOMForUnicodeEncodedFile
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/download_minisign.ps1 -Severity Error,Warning,Information -EnableExit -ExcludeRule PSUseBOMForUnicodeEncodedFile

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - run: pipx run reuse lint

  aarch64-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          architecture: aarch64
          version: "14.0"
          run: sh ci/freebsd.sh

  aarch64-linux:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v6.0.2
      - run: sh ci/linux.sh

  aarch64-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2
      - run: sh ci/aarch64-macos.sh

  aarch64-netbsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: netbsd
          architecture: aarch64
          version: "10.1"
          run: sh ci/aarch64-netbsd.sh

  aarch64-windows:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6.0.2
      - run: .\ci\windows.ps1

  x86_64-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          architecture: x86_64
          version: "14.0"
          run: sh ci/freebsd.sh

  x86_64-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2
      - run: sh ci/linux.sh

  x86_64-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6.0.2
      - run: sh ci/x86_64-macos.sh

  x86_64-netbsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: netbsd
          architecture: x86_64
          version: "10.1"
          run: sh ci/x86_64-netbsd.sh

  x86_64-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6.0.2
      - run: .\ci\windows.ps1

  bench-linux:
    needs: [aarch64-linux, x86_64-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - run: ./zig build generate-bench-data -Dbenchmarks="${{ env.BENCHMARKS }}"
      - run: ./zig build bench-compare -Dbenchmarks="${{ env.BENCHMARKS }}" -Dcompare-refs="${{ env.COMPARE_REFS }}"

  bench-macos:
    needs: [aarch64-macos, x86_64-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - run: ./zig build generate-bench-data -Dbenchmarks="${{ env.BENCHMARKS }}"
      - run: ./zig build bench-compare -Dbenchmarks="${{ env.BENCHMARKS }}" -Dcompare-refs="${{ env.COMPARE_REFS }}"

  bench-windows:
    needs: [aarch64-windows, x86_64-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - run: .\zig.ps1 build generate-bench-data -Dbenchmarks="${{ env.BENCHMARKS }}"
      - run: .\zig.ps1 build bench-compare -Dbenchmarks="${{ env.BENCHMARKS }}" -Dcompare-refs="${{ env.COMPARE_REFS }}"
