name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.actor }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: shellcheck ./tools/zig
      - run: shellcheck ./tools/download_zig.sh
      - run: shellcheck ./tools/minisign
      - run: shellcheck ./tools/download_minisign.sh
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/zig.win.ps1 -Severity Error,Warning,Information -EnableExit
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/download_zig.ps1 -Severity Error,Warning,Information -EnableExit
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/minisign.win.ps1 -Severity Error,Warning,Information -EnableExit
      - shell: pwsh
        run: Invoke-ScriptAnalyzer -Path tools/download_minisign.ps1 -Severity Error,Warning,Information -EnableExit

  test:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { os: "freebsd", arch: "x86-64", version: "15.0", runner: "ubuntu-latest" }
          - { os: "linux", arch: "x86_64", runner: "ubuntu-24.04" }
          - { os: "linux", arch: "x86_64", runner: "ubuntu-22.04" }
          - { os: "linux", arch: "aarch64", runner: "ubuntu-24.04-arm" }
          - { os: "linux", arch: "aarch64", runner: "ubuntu-22.04-arm" }
          - { os: "macos", arch: "x86_64", runner: "macos-15-intel" }
          - { os: "macos", arch: "aarch64", runner: "macos-14" }
          - { os: "macos", arch: "aarch64", runner: "macos-15" }
          - { os: "windows", arch: "x86_64", runner: "windows-2025" }
          - { os: "windows", arch: "x86_64", runner: "windows-2022" }
          - { os: "windows", arch: "aarch64", runner: "windows-11-arm" }
      fail-fast: false

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@v2.2.1
        if: ${{ matrix.os != 'freebsd' }}
        with:
          version: 0.15.2
      - uses: actions/setup-go@v6.1.0
        with:
          go-version: "1.26"
      - run: go install github.com/toml-lang/toml-test/cmd/toml-test@2.1.0
      - run: ./tools/zig.ps1 build test --summary all
        if: ${{ matrix.os != 'freebsd' }}
      - uses: cross-platform-actions/action@v0.32.0
        if: ${{ matrix.os == 'freebsd' }}
        with:
          operating_system: ${{ matrix.os }}
          architecture: ${{ matrix.arch }}
          version: ${{ matrix.version }}
          run: |
            sudo -n pkg install -y minisign
            ./tools/zig.ps1 fetch-toml-test
            ./tools/zig.ps1 build test --summary all

  fetch_toml_test:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { os: "freebsd", arch: "x86-64", version: "15.0", runner: "ubuntu-latest" }
          - { os: "linux", arch: "x86_64", runner: "ubuntu-22.04" }
          - { os: "linux", arch: "aarch64", runner: "ubuntu-22.04-arm" }
          - { os: "macos", arch: "x86_64", runner: "macos-15-intel" }
          - { os: "macos", arch: "aarch64", runner: "macos-14" }
          - { os: "windows", arch: "x86_64", runner: "windows-2022" }
      fail-fast: false

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@v2.2.1
        if: ${{ matrix.os != 'freebsd' }}
        with:
          version: 0.15.2
      - run: ./tools/zig.ps1 build fetch-toml-test
        if: ${{ matrix.os != 'freebsd' }}
      - run: |
          version="$(./vendor/toml-test/toml-test version | cat -d' ' -f2 | tr -d 'v;')"
          echo "TOML_TEST_VERSION=${version}" >> "${GITHUB_ENV}"
        if: ${{ matrix.os != 'freebsd' }}
        shell: bash
      - uses: cross-platform-actions/action@v0.32.0
        if: ${{ matrix.os == 'freebsd' }}
        with:
          operating_system: ${{ matrix.os }}
          architecture: ${{ matrix.arch }}
          version: ${{ matrix.version }}
          run: |
            sudo -n pkg install -y minisign
            ./tools/zig.ps1 build fetch-toml-test
            version="$(./vendor/toml-test/toml-test version | cat -d' ' -f2 | tr -d 'v;')"
            echo "TOML_TEST_VERSION=${version}" >> "${GITHUB_ENV}"
      - run: |
          EXPECTED_VERSION="2.1.0"
          if [ "${TOML_TEST_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "version mismatch: got ${TOML_TEST_VERSION}, expected ${EXPECTED}" >&2
            exit 1
          fi
