name: bench

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-22.04
    env:
      BENCHMARKS: small,medium
      COMPARE_REFS: v0.1.0
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Generate benchmark data
        run: ./zig build generate-bench-data -Dbenchmarks="${{ env.BENCHMARKS }}"

      - name: Run benchmark comparison
        run: ./zig build bench-compare -Dbenchmarks="${{ env.BENCHMARKS }}" -Dcompare-refs="${{ env.COMPARE_REFS }}"
