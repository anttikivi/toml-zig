name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.pull_request.number || forgejo.ref }}
  cancel-in-progress: ${{ forgejo.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  reuse:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - run: pipx run reuse lint
  test:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@v2.2.1
      - run: zig build test-unit --summary all
